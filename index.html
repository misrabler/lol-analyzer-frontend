<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rift Scout</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink:     #0a0c10;
    --panel:   #0f1318;
    --surface: #161b24;
    --border:  #1e2733;
    --muted:   #2a3545;
    --gold:    #c89b3c;
    --gold-dim:#7a5c1e;
    --blue:    #4fc3f7;
    --red:     #ef5350;
    --green:   #66bb6a;
    --text:    #c8d0dc;
    --dim:     #6b7a8d;
    --r:       6px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ink); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

  header { border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; background: var(--panel); }
  header h1 { font-family: 'Cinzel', serif; font-size: 18px; color: var(--gold); letter-spacing: 0.04em; }
  header small { font-size: 11px; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; display: block; }

  #search-wrap { max-width: 620px; margin: 32px auto 0; padding: 0 20px; }
  #search-wrap p { color: var(--dim); font-size: 12px; margin-bottom: 10px; text-align: center; }
  .row { display: flex; gap: 8px; }
  input[type=text], input[type=password] {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r); color: var(--text); font-family: 'JetBrains Mono', monospace;
    font-size: 14px; padding: 10px 14px; outline: none; transition: border-color .15s;
  }
  input:focus { border-color: var(--gold-dim); }
  input::placeholder { color: var(--dim); }
  button.primary {
    background: var(--gold); border: none; border-radius: var(--r); color: var(--ink);
    cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    padding: 10px 20px; transition: opacity .15s; white-space: nowrap;
  }
  button.primary:hover { opacity: .85; }
  button.primary:disabled { opacity: .45; cursor: not-allowed; }

  #cfg-link { text-align: center; margin-top: 8px; font-size: 12px; color: var(--dim); }
  #cfg-link a { color: var(--gold-dim); cursor: pointer; text-decoration: underline; }
  #cfg-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); margin-top: 8px; padding: 12px 14px; display: none; }
  #cfg-panel label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 3px; margin-top: 8px; }
  #cfg-panel label:first-child { margin-top: 0; }
  #cfg-panel input { width: 100%; font-size: 12px; }
  button.secondary { background: var(--muted); border: none; border-radius: var(--r); color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600; padding: 6px 12px; margin-top: 10px; }
  button.secondary:hover { background: var(--border); }

  #status { max-width: 620px; margin: 12px auto 0; padding: 0 20px; text-align: center; font-size: 13px; min-height: 20px; }
  .err { color: var(--red); } .info { color: var(--dim); } .ok { color: var(--green); }

  #app { max-width: 1060px; margin: 24px auto 60px; padding: 0 20px; display: none; }

  /* Comp bar */
  #comp-bar {
    background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
    padding: 12px 16px; margin-bottom: 16px;
  }
  .comp-row { display: flex; gap: 8px; align-items: baseline; flex-wrap: wrap; }
  .comp-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
  .comp-label.blue { color: var(--blue); }
  .comp-label.red  { color: var(--red);  }
  .comp-text { font-size: 13px; color: var(--text); }
  .comp-text.dim { color: var(--dim); font-style: italic; }
  .comp-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .patch-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--dim); float: right; }
  .cached-tag { font-size: 10px; color: var(--green); margin-left: 6px; }

  /* Teams */
  .teams { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  @media (max-width: 640px) { .teams { grid-template-columns: 1fr; } }
  .team-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
  .team-hdr { padding: 8px 14px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .team-hdr.blue { color: var(--blue); } .team-hdr.red { color: var(--red); }

  /* Player row */
  .prow { display: flex; align-items: center; gap: 10px; padding: 8px 14px; border-bottom: 1px solid var(--border); transition: background .1s; }
  .prow:last-child { border-bottom: none; }
  .prow.clickable { cursor: pointer; }
  .prow.clickable:hover { background: var(--surface); }
  .prow.active { background: var(--surface); outline: 1px solid var(--gold-dim); }
  .champ-img { width: 38px; height: 38px; border-radius: 4px; object-fit: cover; background: var(--muted); flex-shrink: 0; }
  .prow-info { flex: 1; min-width: 0; }
  .prow-name { font-weight: 600; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .prow-sub { font-size: 11px; color: var(--dim); display: flex; gap: 6px; align-items: center; margin-top: 2px; }
  .role-badge { font-size: 10px; background: var(--muted); border-radius: 3px; padding: 1px 5px; color: var(--text); text-transform: uppercase; letter-spacing: .04em; }
  .you-tag { font-size: 10px; background: var(--gold-dim); border-radius: 3px; padding: 1px 6px; color: var(--gold); font-weight: 600; }
  .click-hint { font-size: 10px; color: var(--dim); margin-left: auto; }

  /* Matchup panel */
  #matchup-panel { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; display: none; }
  #matchup-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  #matchup-title { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); letter-spacing: .08em; }
  #matchup-meta { font-size: 11px; color: var(--dim); }
  #matchup-content { font-size: 13px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }
  #matchup-content.dim { color: var(--dim); font-style: italic; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted); border-top-color: var(--gold); border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" stroke="#c89b3c" stroke-width="1.5"/>
    <line x1="12" y1="4" x2="12" y2="20" stroke="#c89b3c" stroke-width="1.5"/>
    <line x1="4" y1="12" x2="20" y2="12" stroke="#c89b3c" stroke-width="1.5"/>
    <circle cx="12" cy="12" r="2" fill="#c89b3c"/>
  </svg>
  <div><h1>Rift Scout</h1><small>Live Game Analyzer · NA</small></div>
</header>

<div id="search-wrap">
  <p>Enter your Riot ID to analyze your live game</p>
  <div class="row">
    <input id="rid" type="text" placeholder="YourName#NA1" autocomplete="off" />
    <button class="primary" onclick="analyze()">Analyze</button>
  </div>
  <div id="cfg-link"><a onclick="toggleCfg()">⚙ Configure</a></div>
  <div id="cfg-panel">
    <label>Backend URL (your Render service)</label>
    <input id="cfg-backend" type="text" placeholder="https://your-app.onrender.com" />
    <label>Anthropic API Key</label>
    <input id="cfg-anthropic" type="password" placeholder="sk-ant-..." />
    <button class="secondary" onclick="saveCfg()">Save</button>
  </div>
</div>

<div id="status"></div>

<div id="app">
  <div id="comp-bar">
    <span class="patch-tag" id="patch-tag"></span>
    <div class="comp-row">
      <span class="comp-label blue">Your Team</span>
      <span class="comp-text dim" id="blue-comp">Analyzing…</span>
    </div>
    <div class="comp-divider"></div>
    <div class="comp-row">
      <span class="comp-label red">Enemy</span>
      <span class="comp-text dim" id="red-comp">Analyzing…</span>
    </div>
  </div>

  <div class="teams">
    <div class="team-card">
      <div class="team-hdr blue" id="my-team-hdr">Your Team</div>
      <div id="my-team"></div>
    </div>
    <div class="team-card">
      <div class="team-hdr red" id="enemy-team-hdr">Enemy Team</div>
      <div id="enemy-team"></div>
    </div>
  </div>

  <div id="matchup-panel">
    <div id="matchup-header">
      <span id="matchup-title">Lane Matchup</span>
      <span id="matchup-meta"></span>
    </div>
    <div id="matchup-content" class="dim">Click your champion to see your lane matchup.</div>
  </div>
</div>

<script>
// ── Roles by array index (Riot spectator order matches loading screen) ─────────
const ROLE_BY_INDEX = ['TOP', 'JUNGLE', 'MIDDLE', 'BOTTOM', 'UTILITY'];
const ROLE_LABEL    = { TOP: 'Top', JUNGLE: 'Jgl', MIDDLE: 'Mid', BOTTOM: 'ADC', UTILITY: 'Sup' };

// ── Config ────────────────────────────────────────────────────────────────────
function getCfg() {
  return { backend: localStorage.getItem('rs_backend') || '', anthropic: localStorage.getItem('rs_anthropic') || '' };
}
function saveCfg() {
  localStorage.setItem('rs_backend',   document.getElementById('cfg-backend').value.trim());
  localStorage.setItem('rs_anthropic', document.getElementById('cfg-anthropic').value.trim());
  setStatus('Saved.', 'ok');
}
function toggleCfg() {
  const p = document.getElementById('cfg-panel');
  const c = getCfg();
  document.getElementById('cfg-backend').value   = c.backend;
  document.getElementById('cfg-anthropic').value = c.anthropic;
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}
function setStatus(msg, type = 'info') {
  const el = document.getElementById('status');
  el.className = type; el.innerHTML = msg;
}

// ── Data Dragon ───────────────────────────────────────────────────────────────
let ddVer = '14.10.1', currentPatch = '14.10';
let champById = {};

async function loadChamps(base) {
  try {
    const r = await fetch(`${base}/api/champions`);
    const j = await r.json();
    ddVer = j.version;
    currentPatch = j.patch;
    document.getElementById('patch-tag').textContent = `Patch ${currentPatch}`;
    for (const [, c] of Object.entries(j.data)) champById[c.key] = c;
  } catch (_) {}
}

function champImg(name) {
  return `https://ddragon.leagueoflegends.com/cdn/${ddVer}/img/champion/${name}.png`;
}

function champName(championId) {
  const c = champById[String(championId)];
  return c ? c.id : `Champ${championId}`;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function parseRid(raw) {
  const p = raw.trim().split('#');
  if (p.length !== 2 || !p[0] || !p[1]) throw new Error('Format: Name#Tag — e.g. PlayerName#NA1');
  return { gameName: p[0].trim(), tagLine: p[1].trim() };
}
async function apiFetch(url, opts) {
  const r = await fetch(url, opts);
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || `HTTP ${r.status}`);
  return j;
}

// ── State ─────────────────────────────────────────────────────────────────────
let myPuuid = null, myTeamId = null, activeRow = null;
let myTeamPlayers = [], enemyTeamPlayers = [];

// ── Main ──────────────────────────────────────────────────────────────────────
async function analyze() {
  const cfg = getCfg();
  if (!cfg.backend) {
    setStatus('⚠ Set your backend URL in ⚙ Configure first.', 'err');
    document.getElementById('cfg-panel').style.display = 'block';
    return;
  }

  let rid;
  try { rid = parseRid(document.getElementById('rid').value); }
  catch (e) { setStatus(e.message, 'err'); return; }

  const btn = document.querySelector('button.primary');
  btn.disabled = true;
  document.getElementById('app').style.display = 'none';
  document.getElementById('matchup-panel').style.display = 'none';
  activeRow = null;

  const base = cfg.backend.replace(/\/$/, '');

  try {
    setStatus('<span class="spin"></span>Looking up account…', 'info');
    const account = await apiFetch(`${base}/api/account/${encodeURIComponent(rid.gameName)}/${encodeURIComponent(rid.tagLine)}`);
    myPuuid = account.puuid;

    setStatus('<span class="spin"></span>Fetching live game…', 'info');
    const game = await apiFetch(`${base}/api/livegame/${myPuuid}`);

    const me = game.participants.find(p => p.puuid === myPuuid);
    if (!me) throw new Error('Could not find you in this game.');
    myTeamId = me.teamId;

    setStatus('<span class="spin"></span>Loading data…', 'info');
    await loadChamps(base);

    setStatus('', 'info');
    renderGame(game, cfg.anthropic, base);
    runCompAnalysis(game, cfg.anthropic, base);

  } catch (e) {
    setStatus(e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderGame(game, anthropicKey, base) {
  const blue = game.participants.filter(p => p.teamId === 100);
  const red  = game.participants.filter(p => p.teamId === 200);

  myTeamPlayers    = myTeamId === 100 ? blue : red;
  enemyTeamPlayers = myTeamId === 100 ? red  : blue;

  document.getElementById('my-team').innerHTML    = '';
  document.getElementById('enemy-team').innerHTML = '';
  document.getElementById('app').style.display    = 'block';
  document.getElementById('matchup-panel').style.display = 'block';

  renderTeam(myTeamPlayers,    'my-team',    true,  anthropicKey, base);
  renderTeam(enemyTeamPlayers, 'enemy-team', false, anthropicKey, base);
}

function renderTeam(players, containerId, isMyTeam, anthropicKey, base) {
  const container = document.getElementById(containerId);
  players.forEach((p, idx) => {
    const role  = ROLE_BY_INDEX[idx] || 'UNKNOWN';
    const label = ROLE_LABEL[role]   || '?';
    const name  = champName(p.championId);
    const isMe  = p.puuid === myPuuid;

    const row = document.createElement('div');
    row.className = 'prow' + (isMyTeam ? ' clickable' : '');
    row.innerHTML = `
      <img class="champ-img" src="${champImg(name)}" alt="${name}"
           onerror="this.src='https://ddragon.leagueoflegends.com/cdn/${ddVer}/img/champion/Lux.png'" />
      <div class="prow-info">
        <div class="prow-name">
          ${p.riotId || p.summonerName || 'Unknown'}
          ${isMe ? '<span class="you-tag">YOU</span>' : ''}
        </div>
        <div class="prow-sub">
          <span class="role-badge">${label}</span>
          <span>${name}</span>
        </div>
      </div>
      ${isMyTeam ? '<span class="click-hint">click for matchup</span>' : ''}
    `;

    if (isMyTeam) {
      row.onclick = () => openMatchup(row, idx, name, role, anthropicKey, base);
    }
    container.appendChild(row);
  });
}

// ── Matchup ───────────────────────────────────────────────────────────────────
async function openMatchup(row, myIdx, myChamp, myRole, anthropicKey, base) {
  if (activeRow) activeRow.classList.remove('active');
  row.classList.add('active');
  activeRow = row;

  // Enemy at same index = same role (array position = role)
  const enemyMain = enemyTeamPlayers[myIdx];
  const enemyMainChamp = enemyMain ? champName(enemyMain.championId) : null;

  // Bot lane — pair ADC(idx 3) with Support(idx 4)
  let myPartnerChamp = null, enemyPartnerChamp = null;
  if (myRole === 'BOTTOM') {
    const partner = myTeamPlayers[4];
    if (partner) myPartnerChamp = champName(partner.championId);
    const enemyPartner = enemyTeamPlayers[4];
    if (enemyPartner) enemyPartnerChamp = champName(enemyPartner.championId);
  }
  if (myRole === 'UTILITY') {
    const partner = myTeamPlayers[3];
    if (partner) myPartnerChamp = champName(partner.championId);
    const enemyPartner = enemyTeamPlayers[3];
    if (enemyPartner) enemyPartnerChamp = champName(enemyPartner.championId);
  }

  // Build matchup key — sort so Ashe+Seraphine vs X = Seraphine+Ashe vs X
  const myChamps    = [myChamp, myPartnerChamp].filter(Boolean).sort().join('+');
  const enemyChamps = [enemyMainChamp, enemyPartnerChamp].filter(Boolean).sort().join('+');
  const matchupKey  = `${myChamps}_vs_${enemyChamps}`;

  // Display
  const panel   = document.getElementById('matchup-panel');
  const content = document.getElementById('matchup-content');
  const title   = document.getElementById('matchup-title');
  const meta    = document.getElementById('matchup-meta');

  const myLabel    = myPartnerChamp    ? `${myChamp} + ${myPartnerChamp}`    : `${myChamp} (${ROLE_LABEL[myRole]})`;
  const enemyLabel = enemyPartnerChamp ? `${enemyMainChamp} + ${enemyPartnerChamp}` : (enemyMainChamp || 'Unknown');

  title.textContent = `${myLabel} vs ${enemyLabel}`;
  meta.textContent  = '';
  content.className = 'dim';
  content.textContent = 'Checking cache…';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  if (!anthropicKey) {
    content.className   = '';
    content.textContent = '⚙ Add your Anthropic API key in Configure to enable matchup analysis.';
    return;
  }

  try {
    // Check cache first
    const cache = await apiFetch(`${base}/api/matchup/${encodeURIComponent(matchupKey)}`);

    if (cache.cached) {
      content.className   = '';
      content.textContent = cache.analysis;
      meta.innerHTML      = `<span class="cached-tag">✓ cached · patch ${cache.patch}</span>`;
      return;
    }

    // Not cached — call Claude
    content.textContent = 'Generating matchup…';
    meta.textContent    = `patch ${cache.patch}`;

    const isBotLane = myPartnerChamp !== null;
    const prompt = isBotLane
      ? `LoL matchup. My bot lane: ${myChamp} + ${myPartnerChamp}. Enemy bot lane: ${enemyMainChamp} + ${enemyPartnerChamp}. Give exactly 4 bullet points using • symbol. Max 12 words each. Cover: biggest threat, trade tip, power spike to respect, item to rush. No headers.`
      : `LoL matchup. My ${ROLE_LABEL[myRole]}: ${myChamp} vs enemy ${ROLE_LABEL[myRole]}: ${enemyMainChamp}. Give exactly 4 bullet points using • symbol. Max 12 words each. Cover: biggest threat, trade tip, power spike to respect, item to rush. No headers.`;

    const analysis = await callClaude(prompt, anthropicKey);
    content.className   = '';
    content.textContent = analysis;

    // Save to cache
    await apiFetch(`${base}/api/matchup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ matchup_key: matchupKey, analysis, patch: cache.patch })
    });

  } catch (e) {
    content.className   = '';
    content.textContent = `Error: ${e.message}`;
  }
}

// ── Team comp analysis ────────────────────────────────────────────────────────
async function runCompAnalysis(game, anthropicKey, base) {
  const blueEl = document.getElementById('blue-comp');
  const redEl  = document.getElementById('red-comp');

  const myTeam    = game.participants.filter(p => p.teamId === myTeamId);
  const enemyTeam = game.participants.filter(p => p.teamId !== myTeamId);
  const names     = (team) => team.map(p => champName(p.championId)).join(', ');

  if (!anthropicKey) {
    blueEl.className = 'comp-text'; blueEl.textContent = 'Add API key for analysis.';
    redEl.className  = 'comp-text'; redEl.textContent  = 'Add API key for analysis.';
    return;
  }

  const compKey     = `comp_${names(myTeam)}_vs_${names(enemyTeam)}`;
  const cacheCheck  = await apiFetch(`${base}/api/matchup/${encodeURIComponent(compKey)}`).catch(() => ({ cached: false, patch: currentPatch }));

  if (cacheCheck.cached) {
    const lines  = cacheCheck.analysis.split('\n').filter(Boolean);
    blueEl.className = 'comp-text'; blueEl.textContent = lines[0] || '';
    redEl.className  = 'comp-text'; redEl.textContent  = lines[1] || '';
    return;
  }

  const prompt = `LoL analyst. My team: ${names(myTeam)}. Enemy: ${names(enemyTeam)}.
Reply in EXACTLY this format, two lines only, no extra text:
[comp type] | Win: [condition] | Peaks: [early/mid/late]
[comp type] | Win: [condition] | Peaks: [early/mid/late]`;

  try {
    const text  = await callClaude(prompt, anthropicKey);
    const lines = text.trim().split('\n').filter(Boolean);
    blueEl.className = 'comp-text'; blueEl.textContent = lines[0] || '';
    redEl.className  = 'comp-text'; redEl.textContent  = lines[1] || '';

    // Cache the comp analysis too
    await apiFetch(`${base}/api/matchup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ matchup_key: compKey, analysis: lines.join('\n'), patch: currentPatch })
    });
  } catch (e) {
    blueEl.className = 'comp-text'; blueEl.textContent = 'Analysis unavailable.';
    redEl.className  = 'comp-text'; redEl.textContent  = 'Analysis unavailable.';
  }
}

// ── Claude API ────────────────────────────────────────────────────────────────
async function callClaude(prompt, apiKey) {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 200,
      messages: [{ role: 'user', content: prompt }],
    }),
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e?.error?.message || `Claude error ${r.status}`); }
  const d = await r.json();
  return d.content.map(b => b.text || '').join('');
}

document.getElementById('rid').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
</script>
</body>
</html>
